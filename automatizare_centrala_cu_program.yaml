###############################################################
#  AUTOMATIZARE CENTRALĂ TERMICĂ – 4 TERMOSTATE ZIGBEE
#  + PROGRAM SĂPTĂMÂNAL CU TEMPERATURI PE INTERVALE ORARE
#
#  Structură:
#    - input_number: temperaturi target per interval (editabile din UI)
#    - input_select: modul curent (Dimineață / Plecat / Acasă / Noapte / Manual)
#    - template binary_sensor: se cere căldură?
#    - automation: schimbare interval orar (7 zile × 4 intervale = 28 trigger-e)
#    - automation: pornire/oprire centrală + timeout + alertă offline
#
#  Înlocuiește entity_id-urile cu cele din instalația ta!
###############################################################


